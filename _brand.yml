meta:
  name:
    full: National Institute of Standards and Technology
    short: NIST
typography:
  fonts:
    - family: Aptos
      source: file
      files:
        - path: fonts/aptos/Aptos.ttf
        - path: fonts/aptos/Aptos-Italic.ttf
          style: italic
        - path: fonts/aptos/Aptos-Bold.ttf
          weight: bold
    - family: Aptos Serif
      source: file
      files:
        - path: fonts/aptos/Aptos-Serif.ttf
        - path: fonts/aptos/Aptos-Serif-Italic.ttf
          style: italic
        - path: fonts/aptos/Aptos-Serif-Bold.ttf
          weight: bold
  base:
    family: Aptos
    size: 10pt
    line-height: 1
  headings:
    family: Aptos Serif
    line-height: 1